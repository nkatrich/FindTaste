<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <title>FindTaste - Movie Explorer</title>
    <link rel="shortcut icon" href="./assets/icons/icon-tab/tab-icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./assets/styles/normalize.css">
    <link rel="stylesheet" href="./assets/styles/font.css">
    <link rel="stylesheet" href="./assets/styles/variables.css">
    <link rel="stylesheet" href="./assets/styles/main.css">
    <script src="./assets/scripts/main.js" type="module" defer></script>
    <script src="./assets/scripts/config.js" type="module" defer></script>
    <script src="./assets/scripts/api.js" type="module" defer></script>
    <script src="./assets/scripts/render.js" type="module" defer></script>
</head>
<body>
    <div class="skeleton-card">
        <div class="div-skeleton-card-decor">
            <div class="skeleton-img"></div>
            <div class="skeleton-title"></div>
            <div class="skeleton-title"></div>
            <div class="skeleton-title"></div>
        </div>
        <h2 class="loader-text">Just one moment...</h2>
    </div>
    <div class="container">
        <header class="header">
            <div class="header-container">
                <div class="first-part-of-header">
                    <div class="logo-header"><a href=""><img src="./assets/icons/UI-front/logo.svg" alt="Logotype of 'FindTaste', movie explorer"></a></div>
                </div>
                <div class="second-part-of-header">
                    <div class="div-nav-header">
                        <div class="a-header">
                            <nav class="nav-header">
                                <ul>
                                    <li><a href="#authority">API</a></li>
                                </ul>
                            </nav>
                        </div>
                        <div class="div-search-movies">
                            <div class="div-input">
                                <input class="search-movies" type="search" placeholder="Find your taste..."><span class="img-search"><img src="./assets/icons/UI-front/magnifying-glass.svg" alt="Magnifying glass"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <div class="div-list-of-suggested">
            <div class="list-of-suggested">
        </div>
        </div>
        <div class="app">
            
        </div>
        <div class="div-list-of-wish">
            <a href="#wishlist" class="btn-list-of-wish"><img src="./assets/icons/UI-front/like.svg" alt="Heart icon - define that you wish to see"></a>
        </div>
        <div class="div-error">
            <div class="error">
                <div class="error__icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" viewBox="0 0 24 24" height="24" fill="none"><path fill="#393a37" d="m13 13h-2v-6h2zm0 4h-2v-2h2zm-1-15c-1.3132 0-2.61358.25866-3.82683.7612-1.21326.50255-2.31565 1.23915-3.24424 2.16773-1.87536 1.87537-2.92893 4.41891-2.92893 7.07107 0 2.6522 1.05357 5.1957 2.92893 7.0711.92859.9286 2.03098 1.6651 3.24424 2.1677 1.21325.5025 2.51363.7612 3.82683.7612 2.6522 0 5.1957-1.0536 7.0711-2.9289 1.8753-1.8754 2.9289-4.4189 2.9289-7.0711 0-1.3132-.2587-2.61358-.7612-3.82683-.5026-1.21326-1.2391-2.31565-2.1677-3.24424-.9286-.92858-2.031-1.66518-3.2443-2.16773-1.2132-.50254-2.5136-.7612-3.8268-.7612z"></path></svg>
                </div>
                <div class="error__title">Something went wrong, reload page or make sure that your internet is connected...</div>
            </div>
        </div>
    </div>
</body>
</html>
