<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <title>FindTaste - Movie Explorer</title>
    <link rel="shortcut icon" href="./assets/icons/icon-tab/tab-icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./assets/styles/normalize.css">
    <link rel="stylesheet" href="./assets/styles/font.css">
    <link rel="stylesheet" href="./assets/styles/variables.css">
    <link rel="stylesheet" href="./assets/styles/main.css">
    <script src="./assets/scripts/config.js" type="module" defer></script>
    <script src="./assets/scripts/api.js" type="module" defer></script>
    <script src="./assets/scripts/render.js" type="module" defer></script>
    <script src="./assets/scripts/main.js" type="module" defer></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-container">
                <div class="logo-header"><h1>FindTaste</h1></div>
                <div class="nav-header">
                    <div class="a-header">
                        <nav class="nav-header">
                            <ul>
                                <li><a href="">API</a></li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </header>
        <div class="app">
            <section class="home">
                <section class="recs-slider">
                    <div class="container-recs">
                        <article class="random-recom">
                            <figure class="card-random-recom">
                                <img src="" alt="preview of movie">
                                <figcaption>
                                    <h2 class="title-of-recom"></h2>
                                    <h3 class="date-of-recom"></h3>
                                    <span class="rate-of-recom"><span class="visual-rate-of-recom"></span><span class="percentage-of-rate-of-recom"></span></span>
                                </figcaption>
                            </figure>
                        </article>
                    </div>
                </section>
                <section class="list-movies">
                    <div class="container-list-movies">
                        <div class="div-title-recomindations-list"><h2 class="title-recomindations-list">Recommendations</h2></div>
                        <div class="cards-of-recs-list">
                            <article class="random-recom-card">
                                <figure class="card-random-recom">
                                    <img src="" alt="preview of movie">
                                    <figcaption>
                                        <h2 class="title-of-recom"></h2>
                                        <h3 class="date-of-recom"></h3>
                                        <span class="rate-of-recom"><span class="visual-rate-of-recom"></span><span class="percentage-of-rate-of-recom"></span></span>
                                    </figcaption>
                                </figure>
                            </article>
                        </div>
                    </div>
                </section>
            </section>
        </div>
    </div>
</body>
</html>
